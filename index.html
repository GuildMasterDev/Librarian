<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian - Personal Library Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>📚 Librarian</h1>
            <div class="header-controls">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search books...">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All Books</button>
                    <button class="filter-btn" data-filter="favorites">⭐ Favorites</button>
                    <button class="filter-btn" data-filter="reading">📖 Reading</button>
                    <button class="filter-btn" data-filter="completed">✅ Completed</button>
                    <button class="filter-btn" data-filter="unread">📚 Unread</button>
                    <button class="filter-btn" data-filter="incomplete">⏸️ Incomplete</button>
                </div>
                <button id="addBookBtn" class="add-book-btn">+ Add Book</button>
            </div>
        </header>

        <main class="main-content">
            <div class="stats-bar">
                <span id="totalBooks">Total: 0 books</span>
                <span id="currentFilter">Showing: All Books</span>
            </div>
            
            <div id="booksGrid" class="books-grid"></div>
        </main>

        <div id="addBookModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Add New Book</h2>
                
                <div class="isbn-search">
                    <input type="text" id="isbnSearch" placeholder="Enter ISBN to auto-fill details">
                    <button id="searchISBN">Search</button>
                </div>

                <form id="addBookForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Title *</label>
                            <input type="text" id="title" required>
                        </div>
                        <div class="form-group">
                            <label for="author">Author</label>
                            <input type="text" id="author">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="isbn">ISBN</label>
                            <input type="text" id="isbn">
                        </div>
                        <div class="form-group">
                            <label for="publisher">Publisher</label>
                            <input type="text" id="publisher">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="publicationYear">Publication Year</label>
                            <input type="number" id="publicationYear" min="1000" max="2100">
                        </div>
                        <div class="form-group">
                            <label for="genre">Genre</label>
                            <input type="text" id="genre">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="pageCount">Page Count</label>
                            <input type="number" id="pageCount" min="1">
                        </div>
                        <div class="form-group">
                            <label for="readingStatus">Reading Status</label>
                            <select id="readingStatus">
                                <option value="unread">Unread</option>
                                <option value="reading">Currently Reading</option>
                                <option value="completed">Completed</option>
                                <option value="incomplete">Incomplete (Abandoned)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="coverUrl">Cover Image URL</label>
                        <input type="url" id="coverUrl">
                    </div>
                    
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" rows="4"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isFavorite">
                            Mark as Favorite
                        </label>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit">Add Book</button>
                        <button type="button" class="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="bookDetailsModal" class="modal">
            <div class="modal-content book-details">
                <span class="close">&times;</span>
                <div class="book-details-content"></div>
            </div>
        </div>

        <div id="editBookModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Edit Book</h2>
                <form id="editBookForm">
                </form>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
